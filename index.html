<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAG Organization</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --accent: #ff6b35;
    --accent2: #ffd23f;
    --muted: #666680;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 70% 20%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(255,210,63,0.05) 0%, transparent 40%);
    pointer-events: none; z-index: 0;
  }
  .center {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .tagline {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .site-footer {
    background: #13131a;
    border-top: 1px solid #2a2a38;
    padding: 20px 40px;
    text-align: right;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #666680;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
  }
  .site-footer a {
    color: #ffd23f;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }
  .site-footer a:hover { color: #ff6b35; }
</style>
</head>
<body>
  <div class="center">
    <div class="logo">GAG</div>
    <div class="tagline">Organization</div>
  </div>
  <footer class="site-footer">
    Tasarım &amp; Geliştirme: <a href="https://vionasoft.com" target="_blank">Vionasoft</a>
  </footer>
</body>
</html>
